<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>

<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; ">
    <div style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">

        <h1 style="margin-bottom: 1.5rem;">Create an Account</h1>
        <form method="post"
            style="background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 2rem;">
            {% csrf_token %}

            <div style="margin-bottom: 1rem;">
                <label for="name" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name"
                    style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="email" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email"
                    style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password"
                    style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
            </div>

            <button type="submit"
                style="background-color: #4CAF50; color: white; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; border-radius: 4px; cursor: pointer; margin-bottom: 1rem;">
                Register
            </button>

            {% load socialaccount %}
            {% get_providers as socialaccount_providers %}
            {% if socialaccount_providers %}
            <div style="margin-top: 1rem;">
                <p style="text-align: center; color: #777; margin-bottom: 1rem;">OR</p>
                {% for provider in socialaccount_providers %}
                <a href="{% provider_login_url provider.id %}"
                    style="display: block; text-align: center; background-color: #4285F4; color: white; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; margin-bottom: 0.5rem;">
                    Sign up with {{ provider.name }}
                </a>
                {% endfor %}
            </div>
            {% endif %}

            <p style="margin-top: 1.5rem; color: #555;">
                Already have an account? <a href="{% url 'login' %}"
                    style="color: #2196F3; text-decoration: none;">Login
                    here</a>
            </p>
        </form>
    </div>
</body>

</html>
