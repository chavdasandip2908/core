<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>

<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; ">
    <div style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Registered Users</h1>
            <a href="/logout/" style="color: #f44336; text-decoration: none; font-weight: bold;">Logout</a>
        </div>

        <div style="background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid #ddd;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #eee;">
                        <th style="padding: 1rem 0.5rem; color: #666;">ID</th>
                        <th style="padding: 1rem 0.5rem; color: #666;">Name</th>
                        <th style="padding: 1rem 0.5rem; color: #666;">Email</th>
                        <th style="padding: 1rem 0.5rem; color: #666;">Joined On</th>
                    </tr>
                </thead>
                <tbody>
                    {% if users %}
                    {% for user in users %}
                    <tr style="border-bottom: 1px solid #f9f9f9;">
                        <td style="padding: 1rem 0.5rem;">{{ user.id }}</td>
                        <td style="padding: 1rem 0.5rem; font-weight: 500;">{{ user.name }}</td>
                        <td style="padding: 1rem 0.5rem; color: #555;">{{ user.email }}</td>
                        <td style="padding: 1rem 0.5rem; color: #888; font-size: 0.9rem;">{{ user.created_at|date:"M d,
                            Y" }}
                        </td>
                    </tr>
                    {% endfor %}
                    {% else %}
                    <tr>
                        <td colspan="4" style="padding: 2rem; text-align: center; color: #999;">No users found.</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

        <div style="margin-top: 1.5rem;">
            <a href="/" style="color: #2196F3; text-decoration: none;">&larr; Back to Home</a>
        </div>
    </div>
</body>

</html>
