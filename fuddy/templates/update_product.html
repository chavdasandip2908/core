{% extends 'base.html' %}
{% block content %}
<h1>Create new Recipe Product </h1>
<form method="post" style="margin-top: 2rem;">
    {% csrf_token %}
    <div style="margin-bottom: 1rem;">
        <label for="name" style="font-weight: bold;" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required placeholder="Enter product name" value="{{ product.name }}">
    </div>
    <div style="margin-bottom: 1rem;">
        <label for="description" style="font-weight: bold;" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="4"
            placeholder="Enter product description">{{ product.description }}</textarea>
    </div>
    <div style="margin-bottom: 1rem;">
        <label for="price" style="font-weight: bold;" class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" id="price" name="price" required placeholder="0.00" value="{{ product.price }}">
    </div>
    <div style="margin-bottom: 1rem;">
        <label for="stock" style="font-weight: bold;" class="form-label">Stock</label>
        <input type="number" class="form-control" id="stock" name="stock" required placeholder="0" value="{{ product.stock }}">
    </div>
    <button type="submit"
        style="background-color: #0d6efd; color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1.25rem; "
        class="btn">Update Product</button>
</form>

{% endblock %}
