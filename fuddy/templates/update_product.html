{% extends 'base.html' %}
{% block content %}
<h1 style="margin-bottom: 1.5rem;">Update Product</h1>
<form method="post" style="background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid #ddd;">
    {% csrf_token %}
    <div style="margin-bottom: 1rem;">
        <label for="name" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter product name" value="{{ product.name }}"
            style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    </div>
    <div style="margin-bottom: 1rem;">
        <label for="description" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Description</label>
        <textarea id="description" name="description" rows="3" placeholder="Enter product description"
            style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; font-family: inherit;">{{ product.description }}</textarea>
    </div>
    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
        <div style="flex: 1;">
            <label for="price" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Price</label>
            <input type="number" step="0.01" id="price" name="price" required placeholder="0.00"
                value="{{ product.price }}"
                style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
        </div>
        <div style="flex: 1;">
            <label for="stock" style="display: block; font-weight: bold; margin-bottom: 0.3rem;">Stock</label>
            <input type="number" id="stock" name="stock" required placeholder="0" value="{{ product.stock }}"
                style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
        </div>
    </div>
    <div style="display: flex; gap: 0.75rem;">
        <button type="submit"
            style="background-color: #4CAF50; color: white; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; border-radius: 4px; cursor: pointer;">
            Update Product
        </button>
        <a href="/products/"
            style="padding: 0.6rem 1.5rem; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; text-decoration: none; color: #333; display: inline-block;">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
